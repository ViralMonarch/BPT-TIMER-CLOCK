<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black People Time</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DSEG7+Classic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <style>
        /* --- YOUR CSS TERMINAL DESIGN --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #050505;
            --glow: #00ff41;
            --glow-dim: #00ff4133;
            --text-dim: #0b3d14;
            --surface: #111;
            --font-segment: 'DSEG7 Classic', monospace;
        }
        body { background: var(--bg); color: var(--glow); font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* CRT Scanlines */
        body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.1) 2px, rgba(0, 0, 0, 0.1) 4px); pointer-events: none; z-index: 100; }

        .vfd-container {
            background: linear-gradient(170deg, #071209 0%, #040c06 100%);
            border: 1px solid rgba(0,255,65,0.2);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 10px 30px rgba(0,0,0,0.8);
        }

        .vfd-digits {
            font-family: var(--font-segment);
            font-size: clamp(3rem, 10vw, 5rem);
            color: #00FF9C;
            text-shadow: 0 0 15px #00FF9C, 0 0 30px rgba(0,255,156,0.3);
            margin: 20px 0;
        }

        .label { font-family: 'Courier New', monospace; font-size: 0.7rem; letter-spacing: 4px; color: rgba(0,255,156,0.4); text-transform: uppercase; }

        /* Dial Control */
        .knob-container { margin-top: 30px; }
        input[type=range] { width: 200px; accent-color: var(--glow); cursor: pointer; }

        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        .enter-btn { background: transparent; color: var(--glow); border: 1px solid var(--glow); padding: 15px 30px; cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 5px; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="color: #00ff41; letter-spacing: 10px; margin-bottom: 20px;">BPT SYSTEM</h1>
        <button class="enter-btn" onclick="document.getElementById('splash').classList.add('hidden')">INITIALIZE</button>
    </div>

    <div class="vfd-container">
        <div class="label">Operational Latency</div>
        <div id="bpt-clock" class="vfd-digits">00:00:00</div>
        
        <div class="knob-container">
            <div class="label">BPT Dial: <span id="delay-val">0</span> MINS</div>
            <input type="range" id="bpt-dial" min="0" max="60" value="0">
        </div>

        <div style="margin-top: 20px; opacity: 0.3;" class="label">
            Real Time: <span id="real-time">00:00:00</span>
        </div>
    </div>

    <script>
        // --- p5.js BACKGROUND (Optional) ---
        function setup() { let c = createCanvas(windowWidth, windowHeight); c.parent('splash'); }
        function draw() { background(0, 5); stroke(0, 255, 65, 50); line(random(width), 0, random(width), height); }

        // --- THE BPT ENGINE ---
        let bptMillis = Date.now(); // Start the clock at current time
        const bptDisplay = document.getElementById('bpt-clock');
        const realDisplay = document.getElementById('real-time');
        const dial = document.getElementById('bpt-dial');
        const delayLabel = document.getElementById('delay-val');

        function clockEngine() {
            const now = Date.now();
            const delayMinutes = parseInt(dial.value);
            delayLabel.innerText = delayMinutes;

            // 1. Calculate the TARGET (Real Time MINUS the dial delay)
            // If it's 10:05 and delay is 5, target is 10:00
            const targetTime = now - (delayMinutes * 60000);

            // 2. The Dilation (Slower Pace Logic)
            const gap = targetTime - bptMillis;
            
            // This is the heartbeat: 1000ms (normal) + a fraction of the gap
            // If the clock is too "ahead," it ticks slower to let real time pull away.
            bptMillis += 1000 + (gap * 0.05); 

            // 3. Update Displays
            const bptDate = new Date(bptMillis);
            bptDisplay.innerText = bptDate.toLocaleTimeString([], { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            realDisplay.innerText = new Date(now).toLocaleTimeString();
        }

        // Run the engine every 1 second
        setInterval(clockEngine, 1000);
    </script>
</body>
</html>
